name: Lock Threads

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v5
        with:
          issue-inactive-days: 30
          pr-inactive-days: 14
          issue-lock-reason: resolved
          pr-lock-reason: resolved
          issue-comment: >
            This issue has been automatically locked since there has not been
            any activity after it was closed. Please open a new issue for
            related bugs.
          pr-comment: >
            This pull request has been automatically locked since there has not been
            any activity after it was merged. Please open a new issue for
            related bugs.
