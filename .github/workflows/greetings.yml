name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event.pull_request.head.repo.full_name != github.repository
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! We'll take a look and get back to you.
            Please make sure you've filled out the issue template completely.
          pr-message: |
            Thanks for your first pull request! A maintainer will review it soon.
            Make sure `npm run check` passes and your changes follow the style in `AGENTS.md`.
